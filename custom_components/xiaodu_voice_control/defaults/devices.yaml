devices:
  - appliance_id: demo.switch.desk_lamp
    name: 示例台灯
    type: switch
    entity_id: switch.example_desk_lamp
    actions:
      - turnOn
      - turnOff
    properties:
      - turnOnState

  - appliance_id: demo.cover.bedroom_curtain
    name: 示例窗帘
    type: cover
    entity_id: cover.example_bedroom_curtain
    actions:
      - turnOn
      - turnOff
      - pause
    properties:
      - turnOnState
      - openPercent

  - appliance_id: demo.sensor.room_temperature
    name: 示例房间温度
    type: sensor
    entity_id: sensor.example_room_temperature
    actions: []
    properties:
      - temperatureReading

  - appliance_id: demo.sensor.room_humidity
    name: 示例房间湿度
    type: sensor
    entity_id: sensor.example_room_humidity
    actions: []
    properties:
      - humidity
